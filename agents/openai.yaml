interface:
  display_name: "Critical Agent Critique"
  short_description: "Run a forensic critique of the full current thread and repo history, build a thread census, isolate severe agent drift, then by default in live execution contexts repair it"
  default_prompt: "Use $critical-agent-critique-skill to perform a forensic critique of the full current thread plus the target repo's current code, recent commits, Codex history, Claude history, and repo-local notes. Default to critical-repair mode unless the user clearly asked for critique-only or prompt-only output. Read the selected messages sequentially in full, build a source ledger, report total messages plus separate user, assistant, and tool counts, and emit the required thread census table with one semantic summary row per message. Then do both message-by-message micro-analysis and thematic macro-analysis, identify explicit user problems, agent-driven failures, and implicit contradictions, verify which critical problems still exist in the current code, build a repair checklist, fix only the highest-confidence critical agent-drift failures, verify them with real evidence, rerun the critique on the repaired surfaces, and do not stop until the validated critical checklist is closed or a real blocker remains. If blocked, explicitly analyze the blocker, available tools and accesses, relevant past successful patterns, and the user's real expected end state before stopping."
