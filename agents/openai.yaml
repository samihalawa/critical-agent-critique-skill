interface:
  display_name: "Critical Agent Critique"
  short_description: "Run a forensic critique of the current thread and repo history, isolate only severe agent drift, then report or repair it"
  default_prompt: "Use $critical-agent-critique-skill to perform a forensic critique of this current thread plus the target repo's current code, recent commits, Codex history, Claude history, and repo-local notes. Read the selected messages sequentially, do both message-by-message micro-analysis and thematic macro-analysis, report message counts and key blocks, identify explicit user problems, agent-driven failures, and implicit contradictions, then either return the structured analytical critique with a best recovery prompt or, if the user asked for repair, verify the current code and fix only the highest-confidence critical agent-drift failures."
